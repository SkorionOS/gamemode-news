name: Build announcements.json

on:
  push:
    paths:
      - 'announcements/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build announcements.json
        run: python3 .github/scripts/build-announcements.py
        env:
          TZ: Asia/Shanghai

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add announcements.json docs/
          git diff --cached --quiet || git commit -m "chore: rebuild announcements.json and docs"
          git pull --rebase
          git push

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SkorionOS Updates</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1923;color:#c7d5e0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.6;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:24px 16px}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
h1{font-size:1.5rem;color:#fff;font-weight:700;letter-spacing:.5px}
.lang-select{background:#1b2838;color:#c7d5e0;border:1px solid #2a475e;border-radius:6px;padding:6px 10px;font-size:.85rem;cursor:pointer}
.lang-select:focus{outline:none;border-color:#66c0f4}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{background:transparent;color:#8f98a0;border:1px solid #2a475e;border-radius:20px;padding:6px 16px;font-size:.85rem;cursor:pointer;transition:all .2s}
.tab:hover{border-color:#66c0f4;color:#c7d5e0}
.tab.active{background:var(--ch-color,#66c0f4);color:#fff;border-color:var(--ch-color,#66c0f4)}
.tab[data-channel="all"]{--ch-color:#66c0f4}
.cards{display:flex;flex-direction:column;gap:16px}
.card{background:#1b2838;border:1px solid #2a475e;border-radius:10px;padding:20px;transition:border-color .2s}
.card:hover{border-color:#66c0f4}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.card-title{font-size:1.1rem;color:#fff;font-weight:600}
.badge{font-size:.75rem;padding:2px 10px;border-radius:10px;color:#fff;font-weight:500;white-space:nowrap}
.card-date{font-size:.8rem;color:#8f98a0;margin-left:auto}
.card-body{color:#acb2b8;font-size:.9rem}
.card-body strong{color:#c7d5e0}
.card-body ul{padding-left:20px;margin:6px 0}
.card-body li{margin:3px 0}
.card-body p{margin:6px 0}
.card-body a{color:#66c0f4;text-decoration:none}
.card-body a:hover{text-decoration:underline}
.empty{text-align:center;color:#8f98a0;padding:40px 0;font-size:.95rem}
footer{text-align:center;color:#4a5568;font-size:.75rem;margin-top:40px;padding:20px 0;border-top:1px solid #1b2838}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>SkorionOS Updates</h1>
  <select class="lang-select" id="langSelect">
    <option value="all" data-label-en="All Languages" data-label-zh="所有语言">所有语言</option>
    <option value="english">English</option>
<option value="schinese">简体中文</option>

  </select>
</header>
<div class="tabs" id="tabs">
  <button class="tab active" data-channel="all" data-label-en="All" data-label-zh="全部" style="--ch-color:#66c0f4">全部</button>
  <button class="tab" data-channel="rel" data-label-en="Stable" data-label-zh="稳定版" style="--ch-color:#4caf50">稳定版</button>
<button class="tab" data-channel="beta" data-label-en="Beta" data-label-zh="测试版" style="--ch-color:#ff9800">测试版</button>
<button class="tab" data-channel="main" data-label-en="Preview" data-label-zh="前瞻版" style="--ch-color:#e40336">前瞻版</button>

</div>
<div class="cards" id="cards"></div>
<div class="empty" id="empty" style="display:none">No announcements / 暂无公告</div>
<footer>SkorionOS &copy; 2026</footer>
</div>
<script>
var DATA=[{"title": "System Update", "date": "2026-04-09 17:05", "timestamp": 1775725511, "channel": "rel", "lang": "english", "body": "**SkorionOS 55-6**\n- Improve OneXPlayer support, add OneXPlayer APEX support\n- Improve Steam game mode system update announcement injection\n- Update support for GPD Win5 controller firmware 1.10\n\n**SkorionOS 55-5**\n- Kernel 7.0 rc\n- Mesa 26.0.4\n- Fixed gyroscope not working after sleep on GPD Win5\n- Added gyroscope support for MSI Claw and ClawA8\n- Component updates", "bbcode_body": "[b]SkorionOS 55-6[/b]\n[list]\n[*] Improve OneXPlayer support, add OneXPlayer APEX support\n[*] Improve Steam game mode system update announcement injection\n[*] Update support for GPD Win5 controller firmware 1.10\n[/list]\n\n[b]SkorionOS 55-5[/b]\n[list]\n[*] Kernel 7.0 rc\n[*] Mesa 26.0.4\n[*] Fixed gyroscope not working after sleep on GPD Win5\n[*] Added gyroscope support for MSI Claw and ClawA8\n[*] Component updates\n[/list]", "html_body": "<p><strong>SkorionOS 55-6</strong></p>\n<ul>\n<li>Improve OneXPlayer support, add OneXPlayer APEX support</li>\n<li>Improve Steam game mode system update announcement injection</li>\n<li>Update support for GPD Win5 controller firmware 1.10</li>\n</ul>\n\n<p><strong>SkorionOS 55-5</strong></p>\n<ul>\n<li>Kernel 7.0 rc</li>\n<li>Mesa 26.0.4</li>\n<li>Fixed gyroscope not working after sleep on GPD Win5</li>\n<li>Added gyroscope support for MSI Claw and ClawA8</li>\n<li>Component updates</li>\n</ul>"}, {"title": "系统更新", "date": "2026-04-09 17:05", "timestamp": 1775725511, "channel": "rel", "lang": "schinese", "body": "**SkorionOS 55-6**\n- 完善 OneXPlayer 支持, 添加 OneXPlayer APEX 适配\n- 完善 Steam 游戏模式系统更新公告注入功能\n- 更新支持 GPD Win5 控制器固件 1.10\n\n**SkorionOS 55-5**\n- 内核 7.0 rc\n- Mesa 26.0.4\n- 修复了 GPD Win5 在睡眠唤醒后陀螺仪失效的问题\n- 为 MSI Claw 和 ClawA8 添加了陀螺仪支持\n- 组件更新", "bbcode_body": "[b]SkorionOS 55-6[/b]\n[list]\n[*] 完善 OneXPlayer 支持, 添加 OneXPlayer APEX 适配\n[*] 完善 Steam 游戏模式系统更新公告注入功能\n[*] 更新支持 GPD Win5 控制器固件 1.10\n[/list]\n\n[b]SkorionOS 55-5[/b]\n[list]\n[*] 内核 7.0 rc\n[*] Mesa 26.0.4\n[*] 修复了 GPD Win5 在睡眠唤醒后陀螺仪失效的问题\n[*] 为 MSI Claw 和 ClawA8 添加了陀螺仪支持\n[*] 组件更新\n[/list]", "html_body": "<p><strong>SkorionOS 55-6</strong></p>\n<ul>\n<li>完善 OneXPlayer 支持, 添加 OneXPlayer APEX 适配</li>\n<li>完善 Steam 游戏模式系统更新公告注入功能</li>\n<li>更新支持 GPD Win5 控制器固件 1.10</li>\n</ul>\n\n<p><strong>SkorionOS 55-5</strong></p>\n<ul>\n<li>内核 7.0 rc</li>\n<li>Mesa 26.0.4</li>\n<li>修复了 GPD Win5 在睡眠唤醒后陀螺仪失效的问题</li>\n<li>为 MSI Claw 和 ClawA8 添加了陀螺仪支持</li>\n<li>组件更新</li>\n</ul>"}, {"title": "测试版本系统更新", "date": "2026-04-09 17:05", "timestamp": 1775725511, "channel": "beta", "lang": "schinese", "body": "**SkorionOS 55-6**\n- 完善 OneXPlayer 支持, 添加 OneXPlayer APEX 适配\n- 完善 Steam 游戏模式系统更新公告注入功能\n- 更新支持 GPD Win5 控制器固件 1.10", "bbcode_body": "[b]SkorionOS 55-6[/b]\n[list]\n[*] 完善 OneXPlayer 支持, 添加 OneXPlayer APEX 适配\n[*] 完善 Steam 游戏模式系统更新公告注入功能\n[*] 更新支持 GPD Win5 控制器固件 1.10\n[/list]", "html_body": "<p><strong>SkorionOS 55-6</strong></p>\n<ul>\n<li>完善 OneXPlayer 支持, 添加 OneXPlayer APEX 适配</li>\n<li>完善 Steam 游戏模式系统更新公告注入功能</li>\n<li>更新支持 GPD Win5 控制器固件 1.10</li>\n</ul>"}, {"title": "超级前瞻测试版本系统更新", "date": "2026-04-09 17:05", "timestamp": 1775725511, "channel": "main", "lang": "schinese", "body": "注意，本通道未经过充分测试，可能存在严重 Bug\n**SkorionOS 56**\n- Mesa Git 最新构建", "bbcode_body": "注意，本通道未经过充分测试，可能存在严重 Bug\n[b]SkorionOS 56[/b]\n[list]\n[*] Mesa Git 最新构建\n[/list]", "html_body": "<p>注意，本通道未经过充分测试，可能存在严重 Bug</p>\n<p><strong>SkorionOS 56</strong></p>\n<ul>\n<li>Mesa Git 最新构建</li>\n</ul>"}];
var CHANNEL_LABELS={"rel": {"en": "Stable", "zh": "稳定版"}, "beta": {"en": "Beta", "zh": "测试版"}, "preview": {"en": "Preview", "zh": "预览版"}, "main": {"en": "Preview", "zh": "前瞻版"}};
var LANG_LABELS={"schinese": "简体中文", "tchinese": "繁體中文", "english": "English", "japanese": "日本語", "koreana": "한국어"};
var BROWSER_LANG_MAP={
  "zh":"schinese","zh-cn":"schinese","zh-hans":"schinese",
  "zh-tw":"tchinese","zh-hk":"tchinese","zh-hant":"tchinese",
  "en":"english","ja":"japanese","ko":"koreana",
  "de":"german","fr":"french","es":"spanish","pt":"portuguese",
  "pt-br":"brazilian","ru":"russian","it":"italian","nl":"dutch",
  "pl":"polish","tr":"turkish","vi":"vietnamese","th":"thai",
  "sv":"swedish","fi":"finnish","da":"danish","nb":"norwegian","no":"norwegian",
  "hu":"hungarian","cs":"czech","ro":"romanian","bg":"bulgarian",
  "el":"greek","uk":"ukrainian","id":"indonesian","ms":"indonesian"
};
var AVAILABLE_LANGS={};
for(var i=0;i<DATA.length;i++) if(DATA[i].lang) AVAILABLE_LANGS[DATA[i].lang]=1;

function detectLang(){
  var langs=navigator.languages||[navigator.language||""];
  for(var i=0;i<langs.length;i++){
    var tag=langs[i].toLowerCase();
    var match=BROWSER_LANG_MAP[tag]||BROWSER_LANG_MAP[tag.split("-")[0]];
    if(match&&AVAILABLE_LANGS[match]) return match;
  }
  return "all";
}

var curChannel="all",curLang=detectLang();
document.getElementById("langSelect").value=curLang;

function render(){
  var cards=document.getElementById("cards");
  cards.innerHTML="";
  var count=0;
  for(var i=0;i<DATA.length;i++){
    var e=DATA[i];
    if(curChannel!=="all"&&e.channel!==curChannel) continue;
    if(curLang!=="all"&&e.lang&&e.lang!==curLang) continue;
    count++;
    var ch=e.channel||"";
    var labels=CHANNEL_LABELS[ch]||{};
    var labelText=labels.zh||labels.en||ch;
    var color={"rel": "#4caf50", "beta": "#ff9800", "preview": "#f44336", "main": "#e40336"};
    var c=document.createElement("div");
    c.className="card";
    c.innerHTML='<div class="card-header">'
      +'<span class="card-title">'+esc(e.title)+'</span>'
      +(ch?'<span class="badge" style="background:'+(color[ch]||"#9e9e9e")+'">'+esc(labelText)+'</span>':'')
      +'<span class="card-date">'+esc(e.date.split(" ")[0])+'</span>'
      +'</div>'
      +'<div class="card-body">'+e.html_body+'</div>';
    cards.appendChild(c);
  }
  document.getElementById("empty").style.display=count?"none":"block";
}

function esc(s){var d=document.createElement("span");d.textContent=s;return d.innerHTML;}

document.getElementById("tabs").addEventListener("click",function(ev){
  var btn=ev.target.closest(".tab");
  if(!btn) return;
  curChannel=btn.dataset.channel;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
  btn.classList.add("active");
  render();
});

document.getElementById("langSelect").addEventListener("change",function(){
  curLang=this.value;
  render();
});

render();
</script>
</body>
</html>

htop`，盯着看，没人敢打扰你\n- IDE 字体调成 **12px**，别人凑过来也看不清\n- ~~把游戏窗口~~把终端窗口放在最上层\n- 学会在任何对话中加入\"__这个需要评估一下__\"\n\n```\n$ git commit -m \"fix: 修了个 bug\"\n$ git commit -m \"fix: 修了修 bug 引入的 bug\"\n$ git commit -m \"fix: 不如重写\"\n$ git commit -m \"revert: 算了还是别重写了\"\n```\n\n> 有人问我写代码最重要的是什么，我说是 `Ctrl+Z`。\n\n---\n\n## 甲方语录大赏\n\n### 经典名言\n\n**甲方**：这个需求很简单，你们做一下就好了。\n\n翻译如下：\n\n- \"简单改一下\" = 推翻重做\n- \"参考一下竞品\" = ~~抄一个~~ *致敬*\n- \"我也不知道要什么，你先做一版\" = __你做十版我也不知道要什么__\n- \"这个颜色能不能再 ~~好看~~ *五彩斑斓的黑* 一点\"\n\n> 世界上最遥远的距离，不是生与死，而是甲方说的\"**就差一个程序员了**\"和项目实际需要的人力之间的差距。\n\n---\n\n## 今日份快乐\n\n### 外卖备注合集\n\n1. 多放辣，辣到我说不出话那种，这样就不用跟同事说话了\n1. 麻烦做难吃一点，我在减肥，需要心理上的支持\n1. 不要放香菜，放了我会哭，~~不是矫情~~是真的会哭\n1. 请画一只小恐龙在袋子上，今天心情不好\n\n![外卖小哥的画作](https://http.cat/images/200.jpg)\n\n*↑ 外卖小哥表示：已送达（大概）*\n\n---\n\n## 互联网黑话翻译器\n\n| 黑话 | 真实含义 |\n|------|----------|\n| 赋能 | 帮个忙 |\n| 抓手 | 办法 |\n| 闭环 | 做完 |\n| 颗粒度 | 多细 |\n| 对齐 | 开个会 |\n\n### 造句示例\n\n> 我们需要以**用户价值**为*抓手*，在`Q2`实现业务__闭环__，把颗粒度打到最细，跟各方完成 ~~扯皮~~ **对齐**。\n\n翻译：这个季度得把活干完，跟大家开个会。\n\n---\n\n## 养生专区\n\n**当代年轻人养生现状：**\n\n- 熬夜到凌晨两点 → 喝杯枸杞茶\n- 久坐一天不动 → 买了个 `人体工学椅`\n- 外卖吃到饱 → 点了份 *轻食沙拉*（配炸鸡）\n- 手机不离手 → 贴了张 __防蓝光膜__\n- ~~运动~~ 买了健身卡（从未去过）\n\n![当代养生](https://http.cat/images/418.jpg)\n\n*↑ 我是一个茶壶（418 I'm a teapot）*\n\n---\n\n## 搬💩专区\n\n**今日份💩已送达，请注意查收** 🚛💨\n\n### 白粥\n\n很久很久以前有个老猎人，山中独居数十年，无妻无子，子然一身。\n\n数月前山中打猎之时，见一白狐掉入陷阱，挣扎不得脱。猎人恻隐之心顿起，遂将白狐放生。\n\n说也奇怪，自那日起，猎人每日回家，灶上便有热气腾腾的**白粥**。猎人大喜，食之味道甚异，*不似凡间之物*。\n\n> 一日，老猎人正在喝粥，一云游道士路过此地，见之大惊曰：__此乃狐狸精所做，不可食！__\n\n猎人将信将疑，第二日遂提早回家，果见那畜生对着自家灶台 ~~在煮粥~~ **大飞机**。\n\n---\n\n### 赎身\n\n大家好，我是**林翩翩**。\n\n今天刷到一个帖子，说扬州城赎一个红倌人要多少银两。下面有人回：*一百两*。\n\n一百两什么概念呢。方知宕去二十四桥看苏怜烟一次，茶资加听曲加过夜，`十余两`。他去了十几次，够赎我两回了。\n\n__他没赎。__\n\n> 后来我每日刷新接客，自己攒。攒到快够的时候，城破了，多铎来了。我想着横竖是死，不如拉个垫背的，就染了天花去找他B点下包。\n\n多铎临死前问我：\"你就没想过拿这钱跑吗？\"\n\n我想了想，好像确实没想过。\n\n可能这就是零笔下好女孩的宿命吧。钱攒够了，人也死了。\n\n不过现在有个好消息。零说成本找回来了，**DLC也有戏**。我想着既然项目都回本了，我林翩翩那一百两赎身银子是不是也该结一下了？\n\n不多要，这么多年我自己辛勤耕耘也攒了 `50`，~~剩下的50你们帮我补齐就行~~。\n\n---\n\n### 条件反射\n\n> 发搞笑图片不会让人爱上你，但一直发涩图可以让群友**条件反射**的看到你就发情。\n\n评论区：\n\n- *什么巴普洛夫的狗*\n- 看你都把片哥引来了\n- ~~虽然没破防~~ __但是也没蚌住__\n- 不，可以再搞一点，再加一个美少女的头像。然后再加一个瑟禽的名字。\n\n---\n\n### 室友\n\n跟室友说我失恋了，室友二话不说拉我出去喝酒，喝到凌晨三点。\n\n我说**谢谢你兄弟**，陪我喝了一晚上。\n\n室友说：*啊？我就是想喝酒，你失恋关我屁事*。\n\n> 说完他吐了我一身，我扶他回去洗了澡擦了身子换了衣服。\n> 第二天他问我昨晚谁给他洗的澡，我说是我。\n> 他沉默了一会说：~~\"那我们扯平了\"~~\n> 我：__\"？？？什么扯平了？？？\"__\n\n![💩已签收](https://http.cat/images/406.jpg)\n\n*↑ 406 Not Acceptable —— 以上段子的质量评级*\n\n---\n\n> **免责声明**：本公告纯属虚构，如果你在以上内容中看到了自己的影子……~~那就对了~~ *纯属巧合*。\n\n[查看更多互联网废话](https://github.com/SkorionOS/gamemode-news)", "bbcode_body": "[h1]震惊！这居然是一条测试公告[/h1]\n\n本公告仅用于 [b]格式测试[/b]，如有雷同，纯属 [strike]故意[/strike] [i]巧合[/i]。\n\n[hr][/hr]\n\n[h2]群公告[/h2]\n\n[b]关于群内禁止行为的补充规定[/b] 🚫\n\n经群管理层 [u]一致通过[/u]，现公布以下新增条例：\n\n[olist]\n[*] 禁止在凌晨三点发美食图（饿醒了算谁的）\n[*] 禁止连续复读超过 [code]5[/code] 条（第 6 个人自动禁言）\n[*] 禁止无意义的\"在吗\"（[strike]在，说[/strike]）\n[*] 禁止用\"哈\"结尾的消息少于三个哈（\"哈\"和\"哈哈\"均视为阴阳怪气）\n[/olist]\n\n[quote]\n违规者罚款 [b]一杯瑞幸[/b]，不接受议价。\n—— 群主\n[/quote]\n\n[hr][/hr]\n\n[h2]程序员生存指南[/h2]\n\n[h3]如何优雅地摸鱼[/h3]\n\n资深前辈总结的 [i]终极技巧[/i]：\n\n[list]\n[*] 打开 [code]htop[/code]，盯着看，没人敢打扰你\n[*] IDE 字体调成 [b]12px[/b]，别人凑过来也看不清\n[*] [strike]把游戏窗口[/strike]把终端窗口放在最上层\n[*] 学会在任何对话中加入\"[u]这个需要评估一下[/u]\"\n[/list]\n\n[code]\n$ git commit -m \"fix: 修了个 bug\"\n$ git commit -m \"fix: 修了修 bug 引入的 bug\"\n$ git commit -m \"fix: 不如重写\"\n$ git commit -m \"revert: 算了还是别重写了\"\n[/code]\n\n[quote]\n有人问我写代码最重要的是什么，我说是 [code]Ctrl+Z[/code]。\n[/quote]\n\n[hr][/hr]\n\n[h2]甲方语录大赏[/h2]\n\n[h3]经典名言[/h3]\n\n[b]甲方[/b]：这个需求很简单，你们做一下就好了。\n\n翻译如下：\n\n[list]\n[*] \"简单改一下\" = 推翻重做\n[*] \"参考一下竞品\" = [strike]抄一个[/strike] [i]致敬[/i]\n[*] \"我也不知道要什么，你先做一版\" = [u]你做十版我也不知道要什么[/u]\n[*] \"这个颜色能不能再 [strike]好看[/strike] [i]五彩斑斓的黑[/i] 一点\"\n[/list]\n\n[quote]\n世界上最遥远的距离，不是生与死，而是甲方说的\"[b]就差一个程序员了[/b]\"和项目实际需要的人力之间的差距。\n[/quote]\n\n[hr][/hr]\n\n[h2]今日份快乐[/h2]\n\n[h3]外卖备注合集[/h3]\n\n[olist]\n[*] 多放辣，辣到我说不出话那种，这样就不用跟同事说话了\n[*] 麻烦做难吃一点，我在减肥，需要心理上的支持\n[*] 不要放香菜，放了我会哭，[strike]不是矫情[/strike]是真的会哭\n[*] 请画一只小恐龙在袋子上，今天心情不好\n[/olist]\n\n[img]https://http.cat/images/200.jpg[/img]\n\n[i]↑ 外卖小哥表示：已送达（大概）[/i var BROWSER_LANG_MAP={
  "zh":"schinese","zh-cn":"schinese","zh-hans":"schinese",

};
var AVAILABLE_LANGS={};
for(var i=0;i<DATA.length;i++) if(DATA[i].lang) AVAILABLE_LANGS[DATA[i].lang]=1;

function detectBrowserLang(){
  var langs=navigator.languages||[navigator.language||""];
  for(var i=0;i<langs.length;i++){
    var tag=langs[i].toLowerCase();
    if(tag.startsWith("zh")) return "zh";
  }
  return "en";
}

function detectContentLang(){
  var langs=navigator.languages||[navigator.language||""];
  for(var i=0;i<langs.length;i++){
    var tag=langs[i].toLowerCase();
    var match=BROWSER_LANG_MAP[tag]||BROWSER_LANG_MAP[tag.split("-")[0]];
    if(match&&AVAILABLE_LANGS[match]) return match;
  }
  return "all";
}

var curChannel="all",curLang=detectContentLang();
document.getElementById("langSelect").value=curLang;

var ZH_LANGS={"schinese":1,"tchinese":1};
function getUILang(){
  if(curLang==="all") return detectBrowserLang();
  return ZH_LANGS[curLang]?"zh":"en";
}

function chLabel(labels){var ui=getUILang();return ui==="zh"?(labels.zh||labels.en||""):(labels.en||labels.zh||"");}

function updateUILang(){
  var ui=getUILang();
  document.querySelectorAll(".tab").forEach(function(t){
    var en=t.dataset.labelEn,zh=t.dataset.labelZh;
    t.textContent=ui==="zh"?(zh||en):(en||zh);
  });
  var sel=document.getElementById("langSelect");
  for(var i=0;i<sel.options.length;i++){
    var o=sel.options[i];
    if(o.dataset.labelEn) o.textContent=ui==="zh"?(o.dataset.labelZh||o.dataset.labelEn):(o.dataset.labelEn||o.dataset.labelZh);
  }
}
updateUILang();

function render(){
  var cards=document.getElementById("cards");
  cards.innerHTML="";
  var count=0;
  for(var i=0;i<DATA.length;i++){
    var e=DATA[i];
    if(curChannel!=="all"&&e.channel!==curChannel) continue;
    if(curLang!=="all"&&e.lang&&e.lang!==curLang) continue;
    count++;
    var ch=e.channel||"";
    var labels=CHANNEL_LABELS[ch]||{};
    var labelText=chLabel(labels)||ch;
    var color={"rel": "#4caf50", "beta": "#ff9800", "preview": "#f44336", "main": "#e40336"};
    var c=document.createElement("div");
    c.className="card";
    c.innerHTML='<div class="card-header">'
      +'<span class="card-title">'+esc(e.title)+'</span>'
      +(ch?'<span class="badge" style="background:'+(color[ch]||"#9e9e9e")+'">'+esc(labelText)+'</span>':'')
      +'<span class="card-date">'+esc(e.date.split(" ")[0])+'</span>'
      +'</div>'
      +'<div class="card-body">'+e.html_body+'</div>';
    cards.appendChild(c);
  }
  document.getElementById("empty").style.display=count?"none":"block";
}

  curChannel=btn.dataset.channel;
  document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
  btn.classList.add("active");
  render();
});
